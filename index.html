<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Hisoboti F-1 | F-5 | F-7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-blue: #0a1628;
            --secondary-blue: #1a3a5c;
            --accent-blue: #2563eb;
            --gold: #fbbf24;
            --gold-light: #fcd34d;
            --gold-dark: #d97706;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0f2847 50%, var(--secondary-blue) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(37, 99, 235, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 16px;
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
        }

        /* Screen Management */
        .screen {
            display: none;
            flex: 1;
            width: 100%;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
            width: 100%;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Store Selection Screen - ВСЁ ПО ЦЕНТРУ */
        #storeScreen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .store-grid {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 400px;
        }

        .store-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 2px solid transparent;
            border-radius: 24px;
            padding: 24px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-align: center;
        }

        .store-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .store-card:active {
            transform: scale(0.98);
        }

        .store-card.selected {
            border-color: var(--gold);
            background: linear-gradient(145deg, rgba(251, 191, 36, 0.15) 0%, rgba(251, 191, 36, 0.05) 100%);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }

        .store-card .checkmark {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .store-card.selected .checkmark {
            opacity: 1;
            transform: scale(1);
        }

        .store-card .checkmark svg {
            width: 16px;
            height: 16px;
            stroke: var(--primary-blue);
            stroke-width: 3;
        }

        .store-card .store-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .store-card .store-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .store-card.selected .store-name {
            color: var(--gold);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--primary-blue);
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
        }

        #continueBtn {
            margin-top: 20px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.4s ease;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        #continueBtn.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* Navigation */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 20px 24px;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .nav-item.active {
            color: var(--gold);
            background: rgba(251, 191, 36, 0.1);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* Sync Button */
        .sync-btn {
            position: fixed;
            bottom: 90px;
            right: 16px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--success);
            border: none;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            z-index: 99;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sync-btn:active {
            transform: scale(0.95);
        }

        .sync-btn.syncing {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1001;
            white-space: nowrap;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--danger);
        }

        /* History Screen */
        .history-filters {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .history-filters input,
        .history-filters select {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }

        .history-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .history-item .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .history-item .date {
            font-size: 15px;
            font-weight: 600;
        }

        .history-item .store-badge {
            background: rgba(251, 191, 36, 0.2);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
        }

        .history-item .amounts {
            display: flex;
            gap: 16px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .history-item .amount .label {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .history-item .thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            cursor: pointer;
        }

        .history-item .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .history-item .action-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 12px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Store Selection Screen -->
        <div id="storeScreen" class="screen active">
            <div class="header">
                <h1>Интихоби Магазин</h1>
                <p>Магазини худро интихоб кунед</p>
            </div>

            <div class="store-grid">
                <div class="store-card" data-store="F-1" onclick="selectStore('F-1')">
                    <div class="checkmark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="store-icon">🏪</div>
                    <div class="store-name">F-1</div>
                </div>

                <div class="store-card" data-store="F-5" onclick="selectStore('F-5')">
                    <div class="checkmark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="store-icon">🏪</div>
                    <div class="store-name">F-5</div>
                </div>

                <div class="store-card" data-store="F-7" onclick="selectStore('F-7')">
                    <div class="checkmark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="store-icon">🏪</div>
                    <div class="store-name">F-7</div>
                </div>
            </div>

            <button id="continueBtn" class="btn btn-primary" onclick="goToDailyReport()">
                Идома →
            </button>
        </div>

        <!-- Daily Report Screen -->
        <div id="dailyReportScreen" class="screen">
            <!-- Здесь код дневного отчета (я его сократил для краткости, но в вашем коде он должен быть полным) -->
        </div>

        <!-- Monthly Report Screen -->
        <div id="monthlyReportScreen" class="screen">
            <!-- Здесь код месячного отчета -->
        </div>

        <!-- History Screen -->
        <div id="historyScreen" class="screen">
            <div class="header">
                <h1>Таърих</h1>
            </div>

            <div class="history-filters">
                <input type="date" id="filterDate" onchange="filterHistory()">
                <select id="filterStore" onchange="filterHistory()">
                    <option value="">Ҳама</option>
                    <option value="F-1">F-1</option>
                    <option value="F-5">F-5</option>
                    <option value="F-7">F-7</option>
                </select>
            </div>

            <div id="historyList"></div>
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav class="nav-bar" id="navBar" style="display: none;">
        <div class="nav-item active" onclick="showScreen('dailyReportScreen')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Рӯзона</span>
        </div>
        <div class="nav-item" onclick="showScreen('monthlyReportScreen')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Моҳона</span>
        </div>
        <div class="nav-item" onclick="showScreen('historyScreen')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            <span>Таърих</span>
        </div>
    </nav>

    <!-- Sync Button -->
    <button class="sync-btn" id="syncBtn" onclick="syncWithGitHub()">
        🔄
    </button>

    <!-- Modal -->
    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img class="modal-image" id="modalImage" src="" alt="Receipt">
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const GITHUB_CONFIG = {
            owner: 'ВАШ_ЛОГИН',      // Ваш логин
            repo: 'hisobot',
            path: 'data.json',
            token: 'ВАШ_ТОКЕН'        // НЕ МЕНЯТЬ!
        };

        let selectedStore = null;
        let currentDate = new Date();
        let expenses = [];
        let receiptImage = null;
        let reports = [];
        let categories = [
            { id: 'products', name: 'Маҳсулот' },
            { id: 'salary', name: 'Музд' },
            { id: 'rent', name: 'Иҷора' },
            { id: 'utilities', name: 'Коммунал' },
            { id: 'other', name: 'Дигар' }
        ];
        let selectedCategory = null;

        function loadData() {
            try {
                const storedReports = localStorage.getItem('salesReports');
                if (storedReports) {
                    reports = JSON.parse(storedReports);
                }
                const storedCategories = localStorage.getItem('expenseCategories');
                if (storedCategories) {
                    categories = JSON.parse(storedCategories);
                }
            } catch (e) {
                reports = [];
            }
        }

        function saveData() {
            localStorage.setItem('salesReports', JSON.stringify(reports));
            localStorage.setItem('expenseCategories', JSON.stringify(categories));
        }

        // ИСПРАВЛЕННАЯ функция синхронизации
        async function syncWithGitHub() {
            const btn = document.getElementById('syncBtn');
            btn.classList.add('syncing');
            
            let userToken = localStorage.getItem('github_token');
            
            if (!userToken) {
                userToken = prompt('Введите GitHub токен для синхронизации:');
                if (!userToken) {
                    btn.classList.remove('syncing');
                    return;
                }
                localStorage.setItem('github_token', userToken);
            }
            
            showToast('Синхронизация...', 'info');

            try {
                // Проверяем токен
                const testResponse = await fetch('https://api.github.com/user', {
                    headers: {
                        'Authorization': `token ${userToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!testResponse.ok) {
                    throw new Error('Токен недействителен');
                }
                
                // ПОЛУЧАЕМ данные с GitHub
                const response = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    headers: {
                        'Authorization': `token ${userToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                let githubReports = [];
                let githubCategories = [];

                if (response.ok) {
                    const data = await response.json();
                    const content = JSON.parse(atob(data.content));
                    githubReports = content.reports || [];
                    githubCategories = content.categories || [];
                    
                    // Объединяем reports (приоритет у GitHub, если id совпадают)
                    const mergedReports = [];
                    const allIds = new Set();
                    
                    // Сначала добавляем все GitHub reports
                    githubReports.forEach(r => {
                        mergedReports.push(r);
                        allIds.add(r.id);
                    });
                    
                    // Добавляем локальные, которых нет в GitHub
                    reports.forEach(r => {
                        if (!allIds.has(r.id)) {
                            mergedReports.push(r);
                        }
                    });
                    
                    reports = mergedReports;
                    
                    // Объединяем категории
                    const mergedCategories = [];
                    const catIds = new Set();
                    
                    githubCategories.forEach(c => {
                        mergedCategories.push(c);
                        catIds.add(c.id);
                    });
                    
                    categories.forEach(c => {
                        if (!catIds.has(c.id)) {
                            mergedCategories.push(c);
                        }
                    });
                    
                    categories = mergedCategories;
                    
                    showToast('Данные получены с GitHub!');
                }

                // ЗАГРУЖАЕМ данные на GitHub (всегда загружаем актуальные)
                const dataToUpload = {
                    reports: reports,
                    categories: categories,
                    lastUpdate: new Date().toISOString()
                };

                const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataToUpload, null, 2))));

                // Получаем текущий файл для sha
                const shaResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    headers: {
                        'Authorization': `token ${userToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                let sha = null;
                if (shaResponse.ok) {
                    const data = await shaResponse.json();
                    sha = data.sha;
                }

                // Загружаем
                const uploadResponse = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${userToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: 'Sync data from app',
                        content: content,
                        sha: sha
                    })
                });

                if (uploadResponse.ok) {
                    showToast('✅ Синхронизация успешна!');
                    saveData();
                    updateHistory();
                    updateMonthlyReport();
                } else {
                    const error = await uploadResponse.json();
                    throw new Error(error.message || 'Ошибка загрузки');
                }

            } catch (error) {
                console.error('Sync error:', error);
                showToast('❌ Ошибка синхронизации: ' + error.message, 'error');
                if (error.message.includes('токен') || error.message.includes('token')) {
                    localStorage.removeItem('github_token');
                }
            } finally {
                btn.classList.remove('syncing');
            }
        }

        // Функция удаления отчета
        function deleteReport(id) {
            if (!confirm('Шумо мутмаин ҳастед?')) return;
            
            // Удаляем из локальных данных
            reports = reports.filter(r => r.id !== id);
            saveData();
            
            // Обновляем интерфейс
            updateHistory();
            updateMonthlyReport();
            
            // Показываем сообщение
            showToast('Ҳисобот нест шуд');
            
            // Если есть интернет - сразу синхронизируем с GitHub
            if (navigator.onLine) {
                syncWithGitHub();
            }
        }

        // Остальные функции (selectStore, goToDailyReport и т.д.) остаются без изменений
        // Нужно добавить все функции из предыдущего кода

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reportDate').value = today;
        });

        function selectStore(store) {
            selectedStore = store;
            document.querySelectorAll('.store-card').forEach(card => {
                card.classList.remove('selected');
            });
            document.querySelector('[data-store="' + store + '"]').classList.add('selected');
            document.getElementById('continueBtn').classList.add('visible');
        }

        function goToDailyReport() {
            if (!selectedStore) return;
            document.getElementById('selectedStore').textContent = selectedStore;
            document.getElementById('summaryShop').textContent = selectedStore;
            showScreen('dailyReportScreen');
            document.getElementById('navBar').style.display = 'flex';
            loadDayData();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            const navMap = {
                'dailyReportScreen': 0,
                'monthlyReportScreen': 1,
                'historyScreen': 2
            };
            
            if (navMap[screenId] !== undefined) {
                document.querySelectorAll('.nav-item')[navMap[screenId]].classList.add('active');
            }
            
            if (screenId === 'monthlyReportScreen') {
                updateMonthlyReport();
            } else if (screenId === 'historyScreen') {
                updateHistory();
            }
        }

        function updateHistory() {
            const filterDate = document.getElementById('filterDate').value;
            const filterStore = document.getElementById('filterStore').value;
            
            let filtered = [...reports];
            
            if (filterDate) {
                filtered = filtered.filter(r => r.date === filterDate);
            }
            
            if (filterStore) {
                filtered = filtered.filter(r => r.store === filterStore);
            }
            
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            const container = document.getElementById('historyList');
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><h3>Ҳисобот нест</h3></div>';
                return;
            }
            
            container.innerHTML = filtered.map(r => {
                const d = new Date(r.date);
                const dateStr = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth() + 1).toString().padStart(2, '0') + '.' + d.getFullYear();
                
                let html = '<div class="history-item">' +
                    '<div class="header-row">' +
                        '<div class="date">' + dateStr + '</div>' +
                        '<div class="store-badge">' + r.store + '</div>' +
                    '</div>' +
                    '<div class="amounts">' +
                        '<div><span class="label">Фурӯш:</span> ' + formatMoney(r.totalSales) + '</div>' +
                        '<div><span class="label">Харҷ:</span> ' + formatMoney(r.totalExpenses) + '</div>' +
                    '</div>';
                
                if (r.receiptImage) {
                    html += '<img class="thumbnail" src="' + r.receiptImage + '" onclick="showImageModal(\'' + r.receiptImage + '\')">';
                }
                
                html += '<div class="action-buttons">' +
                    '<button class="btn btn-secondary" onclick="openReport(' + r.id + ')">Кушодан</button>' +
                    '<button class="btn btn-danger" onclick="deleteReport(' + r.id + ')">Нест кардан</button>' +
                '</div></div>';
                
                return html;
            }).join('');
        }

        function filterHistory() {
            updateHistory();
        }

        function formatMoney(amount) {
            return amount.toLocaleString('ru-RU') + ' ₽';
        }

        // Здесь должны быть все остальные функции из полного кода
        // (calculateCash, calculateTotals, addExpense, renderExpenses, и т.д.)
        // Я их сократил для краткости, но в вашем полном коде они есть

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            toast.classList.toggle('error', type === 'error');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function showImageModal(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('imageModal').classList.remove('active');
        }
    </script>
</body>
</html>
